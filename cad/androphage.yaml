# Androphage Parameters
# angles: [ 0, 7, 15 ] # Pitch, tent, yaw
tentAngle: 7
colors:
  black: &black 0x303030
  brass: &brass DarkGoldenrod
  purple: &purple MediumPurple
  silver: &silver Silver
  steel: &steel DarkGray
Columns:
  # Finger columns
  outer:
    skip: true
    keys: 2
  pinky:
    keys: 3
    stagger: -0.75
  ring:
    keys: 4
    shift: [0, -0.25]
    splay: 10
    spread: 1.05556
  middle:
    keys: 4
    splay: 5
    spread: 1.05556
    stagger: 0
  index:
    cutout: true
    keys: 4
    stagger: -0.25
  inner:
    cutout: true
    keys: 3
    stagger: 1
  # Thumb columns
  tuck:
    connect: 1
    cutout: true
    splay: 10
    spread: 0
    stagger: -1
  home:
    connect: 1
    cutout: true
    keys: 2
    splay: 10
  reach:
    connect: 1
    cutout: true
    splay: 10
Battery:
  visible: true
  color: *silver
  size: [ 34, 4.0, 50 ] #Dimensions of battery.
BTU:
  visible: true
  angles: [ 45, 0, 45 ]
  clearance: 10
  color: *steel
  d: 4
  D: 9
  D1: 7.5
  H: 1
  L: 4
  L1: 1.1
Frame:
  visible: true
  chordAngle: 5 #Angle between the chord of the main arc and vertical.
  color: *black
  filletRadius: 1
  lipDepth: 1
  mainRadius: 50
  notchDepth: 6
  thickness: 5
  extraLength: 3
CenterBlock:
  visible: true
  color: *purple
  ribSize: [ 2, 2 ]
  screwCount: 3
  wallThickness: 2
Desk:
  visible: true
  size: [ 300, 200, 1 ]
  position: [ 0, 0, -40 ]
Screw:
  visible: true
  color: *steel
  diameter: 2
  minorDiameter: 1.6
  headDiameter: 4
  headAngle: 90
  offset: 3
Insert:
  visible: true
  color: *brass
  diameter: 3
  height: 3
  holeDiameter: 2.8
  holeDepth: 4
  wallThickness: 1.6
Hinge:
  visible: true
  color: *steel
  diameter: 4.42
  knuckleDepth: 12.7
  length: 80
  leafThickness: 0.04
  leafWidth: 13.5
  offset: 5
  pinDiameter: 2.4
Keycap:
  visible: true
  clearance: 1
  color: *black
  testClearance: false
  profile: lame #[ cherry, dsa, lame, mbk, steno ]
  saddle: false
  spacingType: choc #[ choc, mx, custom ]
  customSpacing: [ 16, 16 ]
LED:
  visible: true
  present: true
  count: 4
  holeRadius: 0.2
  holeShape: square #[ square, circle ]
  holeSize: 3
  holeSpacing: [ 4.5, 0 ]
  positionY: -13
MagneticConnector:
  visible: true
  color: *black
  size: [ 4.7, 26.5, 6.0 ]
  lip: [ 1.0, 28.5, 8.0 ]
  lipOffset: 1.0
MCU:
  visible: true
  chipSize: [ 12, 10, 1.5 ]
  location: main PCB #[ trackball sensor, magnetic connector, main PCB ]
  radius: 2
  size: [ 17.8, 21, 1.2 ]
  usbOverhang: 1.5
  usbRadius: 1.2
  usbSize: [ 9, 7.35, 3.2 ]
  usbCutSize: [ 12, 10, 7 ]
OLED:
  visible: true
  present: false
  holeRadius: 0.5
  pcbSize: [ 15.5, 13 ]
  position: [ 0, 0 ]
  screenSize: [ 12.58, 6.98 ]
PCB:
  visible: true
  color: DarkGreen
  thickness: 1.2
BottomPlate:
  visible: true
  clearance: 3 #[ 1, 10 ]
  color: *black
  thickness: 1.2 #[ 1, 2, 0.2 ]
SwitchPlate:
  visible: true
  present: true
  clearance: 0.2
  color: *purple
  edge: 4 #[ 0, 5 ]
  radius: 1
TopPlate:
  visible: true
  color: *black
  innerRadius: 2 #[ 0, 5, 0.1 ]
  thickness: 1.2
Switch:
  visible: true
  cutout: [14, 14]
  radius: 0.5
  type: glp #[ chocv1, chocv2, mx, glp ]
  travel: 0
  maxTravel: 3.3
  chocColor: Sunset #[ Red, Blue, Brown, Pro Red, Pink, Robin, Sunset, Twilight, Nocturnal, Sunrise, Bokeh ]
  glpColor: Banana #[ Banana, Blue, Brown, Chocolate, Red, Aloe, Cowberry, Daisy, Moss, Panda, Wisteria ]
  mxStemColor: [ 1.0, 1.0, 1.0, 0.8 ] #[ 0, 1, 0.01 ]
  mxTopColor: [ 0, 0.9, 1, 0.6 ] #[ 0, 1, 0.01 ]
  mxBottomColor: [ 0, 0.9, 1, 0.6 ] #[ 0, 1, 0.01 ]
Trackball:
  visible: true
  color: *purple
  diameter: 34
  positionY: 70
  clearance: 1
TrackballSensor:
  visible: true
  pcbSize: [ 16, 25 ]
  size: [ 10.9, 16.2, 1.65 ]
  lensSize: [ 8.6, 16.96, 3.4 ]
  clearance: 2.4
  holeSize: 8
  angle: 60
  holderHeight: 15
  holderThickness: 5
