# Androphage Parameters
main_half: left
tent_angle: 7
Print:
  # Angle for overhangs on 3d-printed parts.
  overhang_angle: 45
  # Default thickness for 3d-printed parts.
  wall_thickness: &wall_thickness 2
  min_wall_thickness: 1
colors:
  black: &black [0x202020, 1]
  brass: &brass [DarkGoldenrod, 1]
  clear: &clear [White, 0.3]
  purple: &purple [MediumPurple, 1]
  silver: &silver [Silver, 1]
  smoke: &smoke [Black, 0.3]
  steel: &steel [DarkGray, 1]
Columns:
  # Finger columns
  outer:
    skip: true
    keys: 2
  pinky:
    keys: 3
    stagger: -0.75
  ring:
    keys: 4
    shift: [0, -0.25]
    splay: 10
    spread: 1.05556
  middle:
    keys: 4
    splay: 5
    spread: 1.05556
    stagger: 0
  index:
    cutout: true
    keys: 4
    stagger: -0.25
  inner:
    cutout: true
    keys: 3
    stagger: 1
  # Thumb columns
  tuck:
    connect: 1
    cutout: true
    splay: 10
    spread: 0
    stagger: -1
  home:
    connect: 1
    cutout: true
    keys: 2
    splay: 10
  reach:
    connect: 1
    cutout: true
    splay: 10
Battery:
  visible: true
  size: [ 34, 4.0, 50 ] #Dimensions of battery.
  color: *silver

# ---- BTU Options ----
BTU_Options:
  Rexroth: &Rexroth
    visible: true
    adjust_screw: true
    ball_diameter: 7.938
    ball_height: 1.6
    clearance: 10
    collar_height: 1.3
    color: *steel
    flange_diameter: 17
    flange_height: 1.9
    housing_diameter: 12.6
    housing_height: 6.4
    model: Rexroth
  VCN310: &VCN310
    visible: true
    adjust_screw: true
    ball_diameter: 4
    ball_height: 1.1
    clearance: 10
    color: *steel
    flange_diameter: 9
    flange_height: 1
    housing_diameter: 7.5
    housing_height: 4
    model: VCN310
  VCN319: &VCN319
    visible: true
    adjust_screw: false
    ball_diameter: 4.76
    ball_height: 1.2
    clearance: 10
    color: *steel
    drive_width: 5
    drive_depth: 6
    flange_diameter: 7
    flange_height: 0
    housing_diameter: 7
    housing_height: 14.8
    model: VCN319
# ---------------------
BTU: *VCN310
CenterBlock:
  visible: true
  # 47 degrees for the BTU Z angle adds a bit of clearance for the sensor
  # without significantly affecting the stability of the trackball.
  btu_angles: [ 0, 30, 47 ]
  color: *purple
  rib_size: [ 2, 2 ]
  screw_count: 3
  wall_thickness: *wall_thickness
Desk:
  visible: true
  color: *clear
  size: [ 300, 200, 1 ]
  position: [ 0, 0, -40 ]
Frame:
  visible: true
  color: *black
  chord_angle: 4 # Angle between the chord of the main arc and vertical.
  fillet_radius: 1
  lip_depth: 1
  main_radius: 50
  notch_depth: 6
  screw_count: 5
  thickness: 5
Hinge:
