# Androphage Parameters
# angles: [ 0, 7, 15 ] # Pitch, tent, yaw
tent_angle: 7
overhang_angle: 45 # Angle for overhangs on 3d-printed parts.
colors:
  black: &black 0x303030
  brass: &brass DarkGoldenrod
  purple: &purple MediumPurple
  silver: &silver Silver
  steel: &steel DarkGray
Columns:
  # Finger columns
  outer:
    skip: true
    keys: 2
  pinky:
    keys: 3
    stagger: -0.75
  ring:
    keys: 4
    shift: [0, -0.25]
    splay: 10
    spread: 1.05556
  middle:
    keys: 4
    splay: 5
    spread: 1.05556
    stagger: 0
  index:
    cutout: true
    keys: 4
    stagger: -0.25
  inner:
    cutout: true
    keys: 3
    stagger: 1
  # Thumb columns
  tuck:
    connect: 1
    cutout: true
    splay: 10
    spread: 0
    stagger: -1
  home:
    connect: 1
    cutout: true
    keys: 2
    splay: 10
  reach:
    connect: 1
    cutout: true
    splay: 10
Battery:
  visible: true
  size: [ 34, 4.0, 50 ] #Dimensions of battery.
  color: *silver

# ---- BTU Models ----
BTU_Models:
  Rexroth: &Rexroth
    visible: true
    ball_diameter: 7.938
    ball_height: 1.6
    clearance: 10
    collar_height: 1.3
    color: *steel
    flange_diameter: 17
    flange_height: 1.9
    housing_diameter: 12.6
    housing_height: 6.4
    model: Rexroth
  VCN310: &VCN310
    visible: true
    ball_diameter: 4
    ball_height: 1.1
    clearance: 10
    color: *steel
    flange_diameter: 9
    flange_height: 1
    housing_diameter: 7.5
    housing_height: 4
    model: VCN310
  VCN319: &VCN319
    visible: true
    ball_diameter: 4.76
    ball_height: 1.2
    clearance: 10
    color: *steel
    drive_width: 5
    drive_depth: 6
    flange_diameter: 7
    flange_height: 0
    housing_diameter: 7
    housing_height: 14.8
    model: VCN319
# --------------------
BTU: *VCN310
Frame:
  visible: true
  chord_angle: 4 # Angle between the chord of the main arc and vertical.
  color: *black
  fillet_radius: 1
  lip_depth: 1
  main_radius: 50
  notch_depth: 6
  thickness: 5
  # extra_length: 3
CenterBlock:
  visible: true
  # 47 degrees for the BTU Z angle adds a bit of clearance for the sensor
  # without significantly affecting the stability of the trackball.
  btu_angles: [ 0, 30, 47 ]
  color: *purple
  rib_size: [ 2, 2 ]
  screw_count: 3
  wall_thickness: 2
Desk:
  visible: true
  size: [ 300, 200, 1 ]
  position: [ 0, 0, -40 ]
Screw:
  visible: true
  color: *steel
  diameter: 2
  minor_diameter: 1.6
  head_diameter: 4
  head_angle: 90
  offset: 3
Insert:
  visible: true
  color: *brass
  diameter: 3
  height: 3
  hole_diameter: 2.8
  hole_depth: 4
  wall_thickness: 1.6
Hinge:
  visible: true
  color: *steel
  diameter: 4.42
  knuckle_depth: 12.7
  length: 80
  leaf_thickness: 0.04
  leaf_width: 13.5
  offset: 5
  pin_diameter: 2.4
Keycap:
  visible: true
  clearance: 1
  color: *black
  test_clearance: false
  profile: lame #[ cherry, dsa, lame, mbk, steno ]
  saddle: false
  spacing_type: choc #[ choc, mx, custom ]
  custom_spacing: [ 16, 16 ]
LED:
  visible: true
  present: true
  count: 4
  hole_radius: 0.2
  hole_shape: square #[ square, circle ]
  hole_size: 3
  hole_spacing: [ 4.5, 0 ]
  position_y: -13
MagneticConnector:
  visible: true
  color: *black
  lip: [ 1.0, 28.5, 8.0 ]
  lip_offset: 1.0
  position_y: 30
  size: [ 4.7, 26.5, 6.0 ]
  screw_offset: 18
MCU:
  visible: true
  chip_size: [ 12, 10, 1.5 ]
  location: main PCB #[ trackball sensor, magnetic connector, main PCB ]
  radius: 2
  size: [ 17.8, 21, 1.2 ]
  usb_overhang: 1.5
  usb_radius: 1.2
  usb_size: [ 9, 7.35, 3.2 ]
  usb_cut_size: [ 12, 10, 7 ]
OLED:
  visible: true
  present: false
  hole_radius: 0.5
  pcb_size: [ 15.5, 13 ]
  position: [ 0, 0 ]
  screen_size: [ 12.58, 6.98 ]
PCB:
  visible: true
  color: DarkGreen
  thickness: &pcb_thickness 1.2
BottomPlate:
  visible: true
  clearance: 3 #[ 1, 10 ]
  color: *black
  thickness: 1.2 #[ 1, 2, 0.2 ]
SwitchPlate:
  visible: true
  present: true
  clearance: 0.2
  color: *purple
  edge: 4 #[ 0, 5 ]
  radius: 1
TopPlate:
  visible: true
  color: *black
  radius_inner: 2 #[ 0, 5, 0.1 ]
  thickness: 1.2
Switch:
  visible: true
  cutout: [14, 14]
  radius: 0.5
  type: glp #[ chocv1, chocv2, mx, glp ]
  travel: 0
  max_travel: 3.3
  choc_color: Sunset #[ Red, Blue, Brown, Pro Red, Pink, Robin, Sunset, Twilight, Nocturnal, Sunrise, Bokeh ]
  glp_color: Banana #[ Banana, Blue, Brown, Chocolate, Red, Aloe, Cowberry, Daisy, Moss, Panda, Wisteria ]
  mx_stem_color: [ 1.0, 1.0, 1.0, 0.8 ] #[ 0, 1, 0.01 ]
  mx_top_color: [ 0, 0.9, 1, 0.6 ] #[ 0, 1, 0.01 ]
  mx_bottom_color: [ 0, 0.9, 1, 0.6 ] #[ 0, 1, 0.01 ]
Trackball:
  visible: true
  color: *purple
  diameter: 34
  position_y: 70
  clearance: 1
TrackballSensor:
  visible: true
  angle: 60
  chip_size: [ 10.9, 16.2, 1.65 ]
  clearance: 2.4
  holder_height: 15
  holder_thickness: 5
  hole_size: 8
  lens_size: [ 8.6, 16.96, 3.4 ]
  optical_center: 2.52 # Distance from center of lens to optical center.
  pcb_size: [ 16, 25, *pcb_thickness ]

