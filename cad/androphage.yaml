# Androphage Parameters
spacing: [18, 17]
cutout: [14, 14]
columns:
  thumb_inner:
    spread: 0
  thumb_home:
    keys: 2
    splay: 10
  thumb_outer1:
    splay: 10
  thumb_outer2:
    splay: 10
  finger_inner:
    keys: 3
    stagger: 1
    spread: -1
  finger_index:
    keys: 3
    spread: 1
  finger_middle:
    keys: 4
    stagger: -0.75
  finger_ring:
    keys: 4
    shift: [0, -0.25]
    stagger: 0 #-0.5
    splay: 5
  finger_pinky:
    keys: 3
    splay: 10
  finger_outer:
    skip: true
    keys: 2
    stagger: 0.75
outlines:
  outline:
    - what: Line
      points:
        - ref: thumb_inner_0
          adjust:
            shift: [-0.5, 0.5]

    - what: Line
      points:
        - ref: thumb_inner_0
          adjust.shift: [-0.5, -0.5]
        - ref: thumb_inner_0
          adjust.shift: [-0.5, 0.5]
    - what: ThreePointArc
      points:
        - ref: thumb_inner_0
          adjust.shift: [0, -0.5]
        - ref: thumb_home_0
          adjust.shift: [0.5, -0.5]
        - ref: thumb_outer2_0
          adjust.shift: [0, -0.5]
    - what:
