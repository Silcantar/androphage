MagneticConnector:
  visible: true
  color: *black
  lip: [ 1.0, 28.5, 8.0 ]
  lip_offset: 1.0
  position_y: 30
  size: [ 4.7, 26.5, 6.0 ]
  screw_offset: 18
MCU:
  visible: true
  color:
  chip_size: [ 12, 10, 1.5 ]
  location: main PCB #[ trackball sensor, magnetic connector, main PCB ]
  radius: 2
  size: [ 17.8, 21, 1.2 ]
  usb_overhang: 1.5
  usb_radius: 1.2
  usb_size: [ 9, 7.35, 3.2 ]
  usb_cut_size: [ 12, 10, 7 ]
OLED:
  visible: true
  color:
  present: false
  hole_radius: 0.5
  pcb_size: [ 15.5, 13 ]
  position: [ 0, 0 ]
  screen_size: [ 12.58, 6.98 ]
Plates:
  Bottom:
    visible: true
    color: *smoke
    radius_outer: 2
    thickness: 3
  PCB:
    visible: true
    color: DarkGreen
    # This both ensures clearance between the PCB and bottom plate and
    clearance: 3
    radius_outer: 2
    thickness: &pcb_thickness 1.2
  Switch:
    visible: true
    color: *purple
    edge: 5
    radius_outer: 2
    # thickness:
  Top:
    visible: true
    color: *black
    radius_inner: 2
    radius_outer: 2
    thickness: *wall_thickness
    thumb_cutout_fillet: false
Screw:
  visible: true
  color: *steel
  diameter: 2
  minor_diameter: 1.6
  head_diameter: 4
  head_angle: 90
  offset: 3

